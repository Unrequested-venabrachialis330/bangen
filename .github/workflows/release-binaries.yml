name: Build Bangen (Nuitka)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build fingerprint + cache key
        id: meta
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA=$(git rev-parse --short HEAD)
          DEPS_HASH=$(shasum -a 256 pyproject.toml 2>/dev/null | cut -d' ' -f1 || echo "nodeps")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "DEPS=$DEPS_HASH" >> $GITHUB_OUTPUT
          echo "CACHE_KEY=${{ runner.os }}-$VERSION-$DEPS_HASH" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cross-workflow cache (Nuitka + deps)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ steps.meta.outputs.CACHE_KEY }}
          restore-keys: |
            nuitka-${{ runner.os }}-${{ steps.meta.outputs.VERSION }}-
            nuitka-${{ runner.os }}-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential strip

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: xcode-select -p || xcode-select --install || true

      - name: MSVC setup (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python deps (locked build)
        run: |
          python -m pip install -U pip wheel setuptools
          pip install nuitka[onefile]
          pip install .

      - name: Create entrypoint
        shell: bash
        run: |
          cat > _entry.py << 'EOF'
          from bangen.app import main
          if __name__ == "__main__":
              main()
          EOF

      - name: Nuitka parallel build (REAL speed boost)
        shell: bash
        run: |
          python -m nuitka \
            --mode=onefile \
            --lto=yes \
            --jobs=2 \
            --assume-yes-for-downloads \
            --output-dir=build \
            --output-filename=bangen \
            --include-package=bangen \
            --include-package=rich \
            --include-package=pyfiglet \
            --include-package=PIL \
            --include-package=typer \
            --include-package=click \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=test \
            --nofollow-import-to=distutils \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=pkg_resources \
            --python-flag=no_asserts \
            --python-flag=no_docstrings \
            --python-flag=isolated \
            --onefile-tempdir-spec={CACHE_DIR}/bangen/${{ steps.meta.outputs.VERSION }} \
            _entry.py

      - name: Fingerprinted artifacts (immutable builds)
        shell: bash
        run: |
          mkdir -p dist
          NAME="bangen-${{ matrix.name }}-${{ steps.meta.outputs.VERSION }}-${{ steps.meta.outputs.SHA }}"

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            mv build/bangen dist/$NAME
            strip dist/$NAME
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv build/bangen dist/$NAME
          else
            mv build/bangen.exe dist/$NAME.exe
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog (safe range)
        id: changelog
        shell: bash
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $PREV..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create DRAFT release (approval pipeline)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bangen ${{ github.ref_name }}
          draft: true
          body: |
            ## 🚀 Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## 🧬 Build Info
            - Commit: ${{ github.sha }}
            - Parallel matrix build (Linux/macOS/Windows)
            - Nuitka LTO enabled
          files: artifacts/**/*