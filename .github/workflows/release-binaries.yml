name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib, pathlib
          v = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          print(f"version={v}")
          print(f"tag=v{v}")
          PY

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}

  build:
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            exe: bangen
          - os: macos-latest
            platform: macos-universal2
            exe: bangen
          - os: windows-latest
            platform: windows-x86_64
            exe: bangen.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 🔥 Cache Nuitka + compiler artifacts
      - name: Cache Nuitka + compiler
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.ccache
            ~/AppData/Local/Nuitka
            ~/AppData/Local/ccache
          key: nuitka-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml', 'bangen/**/*.py') }}
          restore-keys: |
            nuitka-${{ runner.os }}-3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . "nuitka[onefile]"

      # Ensure Nuitka uses cache path
      - name: Set Nuitka cache dir
        run: echo "NUITKA_CACHE_DIR=$HOME/.cache/Nuitka" >> $GITHUB_ENV

      - name: Build (Nuitka onefile optimized)
        shell: bash
        run: |
          python -m nuitka \
            --mode=onefile \
            --assume-yes-for-downloads \
            --output-dir=build \
            --output-filename=bangen \
            --follow-imports \
            --lto=yes \
            --jobs=2 \
            --python-flag=no_asserts \
            --python-flag=no_docstrings \
            --python-flag=isolated \
            --onefile-tempdir-spec="{CACHE_DIR}/bangen/${{ needs.metadata.outputs.version }}" \
            --clang \
            bangen/__main__.py

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets

          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="build/bangen.exe"
          else
            BIN="build/bangen"
            chmod +x "$BIN"
          fi

          cp "$BIN" \
            "release-assets/bangen-${{ needs.metadata.outputs.tag }}-${{ matrix.platform }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bangen-${{ needs.metadata.outputs.tag }}-${{ matrix.platform }}
          path: release-assets/*

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          files: release-assets/*
